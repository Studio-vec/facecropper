<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  .card {

  .previews { display: none; gap: 12px; }

  .preview-wrap { display: flex; flex-direction: column; gap: 6px; }

  .reset-link {

  /* 업스케일 안내 모달 */

<h1>2026 세지포 파이팅!</h1>
<p class="sub">얼굴 자동 인식 → 300×300 JPG 저장</p>

<div class="card">

  <div class="dropzone" id="dropzone">
    <div class="dropzone-icon">🖼</div>
    <div class="dropzone-label">이미지를 드래그하거나 클릭해서 업로드</div>

    </div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-label" id="progressLabel">AI 업스케일 중... 0%</div>
    <div class="progress-bar-bg"><div class="progress-bar" id="progressBar"></div></div>
  </div>

  <div class="spinner" id="spinner"></div>

  <button class="btn" id="downloadBtn" disabled onclick="downloadResult()">저장</button>
  <span class="reset-link" id="resetLink" onclick="resetAll()">다시 업로드</span>

</div>

<script>
// ── 빌드 타임스탬프 표시 ──────────────────────────
const BUILD_TIME = '2026-04-01T07:13:48Z';
(function() {
  const d = new Date(BUILD_TIME);
  const pad = n => String(n).padStart(2,'0');
  const label = `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())} `
              + `${pad(d.getHours())}:${pad(d.getMinutes())} 배포`;
  document.getElementById('buildInfo').textContent = label;
})();

// ── 배포 설정 ──────────────────────────────────────
const FACE_FILL_RATIO = 0.45; // 결과 이미지에서 얼굴이 차지할 비율 (0~1)
const CENTER_Y_RATIO = 0.35;
const OUTPUT_SIZE    = 300;
const MAX_FILE_MB    = 10;
const UPSCALE_THRESHOLD = 500; // 이 픽셀 이하면 AI 업스케일 적용
const PAD_COLOR      = '#ffffff';
// ──────────────────────────────────────────────────

let upscaler = null;

// 업스케일러 지연 초기화 (첫 사용 시)
async function getUpscaler() {
  if (upscaler) return upscaler;
  upscaler = new Upscaler({ model: ESRGANSlim });
  return upscaler;
}

const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.13/model';

let modelsReady = false;
let lastImg = null;
let lastBox = null;
let originalFileName = '';
let pendingImg = null;   // 모달 대기 중인 이미지
let pendingFile = null;  // 모달 대기 중인 파일

const progressWrap  = document.getElementById('progressWrap');
const progressBar   = document.getElementById('progressBar');
const progressLabel = document.getElementById('progressLabel');
const upscaleModal  = document.getElementById('upscaleModal');

const dropzone     = document.getElementById('dropzone');
const fileInput    = document.getElementById('fileInput');
const previews     = document.getElementById('previews');
const origImg      = document.getElementById('origImg');
const resultCanvas = document.getElementById('resultCanvas');
const spinner      = document.getElementById('spinner');
const statusEl     = document.getElementById('status');
const downloadBtn  = document.getElementById('downloadBtn');
const resetLink    = document.getElementById('resetLink');
const errorBox     = document.getElementById('errorBox');
const errorTitle   = document.getElementById('errorTitle');
const errorMsg     = document.getElementById('errorMsg');

function waitForFaceAPI(cb) {
  if (typeof faceapi !== 'undefined') cb();
  else setTimeout(() => waitForFaceAPI(cb), 100);
}
waitForFaceAPI(async () => {
  try {
    await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
    await faceapi.nets.faceLandmark68TinyNet.loadFromUri(MODEL_URL);
    modelsReady = true;
    setStatus('이미지를 업로드하세요');
  } catch {
    showError('모델 로딩 실패', '네트워크 연결을 확인하고 새로고침 해주세요.');
  }
});

dropzone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('over'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('over'));
dropzone.addEventListener('drop', e => {
  e.preventDefault(); dropzone.classList.remove('over');
  const f = e.dataTransfer.files[0];
  if (f) handleFile(f);
});

async function handleFile(file) {
  hideError();
  resetLink.classList.remove('visible');
  downloadBtn.disabled = true;
  originalFileName = file.name;

  if (!modelsReady) { showError('모델 준비 중', '잠시 후 다시 시도해 주세요.'); return; }
  if (file.size > MAX_FILE_MB * 1024 * 1024) {
    showError('파일 크기 초과', `파일 크기가 ${MAX_FILE_MB}MB를 초과합니다. (현재 ${(file.size/1024/1024).toFixed(1)}MB)`);
    resetLink.classList.add('visible');
    return;
  }
  const ALLOWED = ['image/jpeg','image/png','image/webp','image/heic','image/bmp','image/tiff'];
  if (!ALLOWED.includes(file.type) && !file.type.startsWith('image/')) {
    showError('지원하지 않는 형식', '이미지 파일만 업로드할 수 있습니다.');
    resetLink.classList.add('visible');
    return;
  }

  const url = URL.createObjectURL(file);
  origImg.src = url;
  previews.classList.add('visible');
  setStatus('');
  spinner.classList.add('visible');

  const img = new Image();
  img.onload = async () => {
    spinner.classList.remove('visible');
    // 500px 이하면 모달 띄우기
    if (Math.max(img.width, img.height) <= UPSCALE_THRESHOLD) {
      pendingImg = img;
      upscaleModal.classList.add('visible');
    } else {
      await processImage(img);
    }
  };
  img.onerror = () => {
    spinner.classList.remove('visible');
    showError('파일 오류', '이미지를 불러올 수 없습니다. 파일이 손상되었을 수 있습니다.');
    resetLink.classList.add('visible');
  };
  img.src = url;
}

// 모달: 업스케일 후 진행
async function confirmUpscale() {
  upscaleModal.classList.remove('visible');
  await processImage(pendingImg, true);
}

// 모달: 그냥 진행
async function skipUpscale() {
  upscaleModal.classList.remove('visible');
  await processImage(pendingImg, false);
}

// 실제 이미지 처리 (업스케일 여부 선택)
async function processImage(img, doUpscale = false) {
  spinner.classList.add('visible');
  let procImg = img;

  if (doUpscale) {
    spinner.classList.remove('visible');
    progressWrap.classList.add('visible');
    setProgress(0, 'AI 업스케일 준비 중...');

    try {
      const up = await getUpscaler();
      // 가짜 진행률 애니메이션 (실제 콜백 없으므로 타이머로 대체)
      let fakeP = 0;
      const timer = setInterval(() => {
        fakeP = Math.min(fakeP + Math.random() * 4, 90);
        setProgress(fakeP, `AI 업스케일 중... ${Math.round(fakeP)}%`);
      }, 800);

      procImg = await up.upscale(img);
      clearInterval(timer);
      setProgress(100, '업스케일 완료!');
      await new Promise(r => setTimeout(r, 500));
    } catch(e) {
      console.warn('업스케일 실패, 원본 사용:', e);
      setProgress(100, '업스케일 실패 — 원본으로 진행합니다');
      await new Promise(r => setTimeout(r, 800));
    }

    progressWrap.classList.remove('visible');
    spinner.classList.add('visible');
  }

  try {
    setStatus('얼굴 인식 중...');
    const opts = new faceapi.TinyFaceDetectorOptions({ inputSize: 512, scoreThreshold: 0.4 });
    const dets = await faceapi.detectAllFaces(procImg, opts).withFaceLandmarks(true);

    if (!dets || dets.length === 0) {
      spinner.classList.remove('visible');
      showError('얼굴 인식 실패', '사진에서 얼굴을 찾지 못했습니다. 정면을 바라보는 선명한 사진을 사용해 주세요.');
      resetLink.classList.add('visible');
      return;
    }

    const det = dets.reduce((a, b) =>
      a.detection.box.width * a.detection.box.height >=
      b.detection.box.width * b.detection.box.height ? a : b
    );

    const lm = det.landmarks.positions;
    const topY    = Math.min(...lm.slice(17, 27).map(p => p.y));
    const bottomY = Math.max(...lm.slice(0, 17).map(p => p.y));
    const leftX   = Math.min(...lm.map(p => p.x));
    const rightX  = Math.max(...lm.map(p => p.x));
    const faceH   = bottomY - topY;
    const faceW   = rightX - leftX;
    const faceSize = Math.max(faceW, faceH);
    const faceCx   = (leftX + rightX) / 2;
    const faceCy   = topY + faceH * CENTER_Y_RATIO;

    lastImg = procImg; lastBox = { cx: faceCx, cy: faceCy, faceSize };
    cropAndDraw(procImg, lastBox);
    spinner.classList.remove('visible');
    setStatus('인식 완료 ✓');
    downloadBtn.disabled = false;
    resetLink.classList.add('visible');
  } catch {
    spinner.classList.remove('visible');
    showError('처리 오류', '이미지 처리 중 문제가 발생했습니다.');
    resetLink.classList.add('visible');
  }
}

function setProgress(pct, label) {
  progressBar.style.width = pct + '%';
  progressLabel.textContent = label;
}
function sampleEdgeColor(img, sx, sy, size) {
  const tmpC = document.createElement('canvas');
  const tmpCtx = tmpC.getContext('2d');
  // 원본 이미지에서 크롭 영역 안쪽 가장자리 샘플링 (이미지 범위 내)
  const csx = Math.max(sx, 0), csy = Math.max(sy, 0);
  const cex = Math.min(sx + size, img.width), cey = Math.min(sy + size, img.height);
  const cw = cex - csx, ch = cey - csy;
  if (cw <= 0 || ch <= 0) return '#ffffff';

  // 작은 캔버스에 이미지 그려서 픽셀 샘플링
  const S = 20;
  tmpC.width = S; tmpC.height = S;
  tmpCtx.drawImage(img, csx, csy, cw, ch, 0, 0, S, S);

  let r = 0, g = 0, b = 0, count = 0;
  // 가장자리 픽셀만 샘플 (상/하/좌/우 1px 테두리)
  const data = tmpCtx.getImageData(0, 0, S, S).data;
  for (let i = 0; i < S; i++) {
    for (let j = 0; j < S; j++) {
      if (i === 0 || i === S-1 || j === 0 || j === S-1) {
        const idx = (i * S + j) * 4;
        r += data[idx]; g += data[idx+1]; b += data[idx+2];
        count++;
      }
    }
  }
  r = Math.round(r/count); g = Math.round(g/count); b = Math.round(b/count);
  return `rgb(${r},${g},${b})`;
}

function cropAndDraw(img, { cx, cy, faceSize }) {
  const size = faceSize / FACE_FILL_RATIO;
  const half = size / 2;
  const sx = cx - half;
  const sy = cy - half;

  const ctx = resultCanvas.getContext('2d');
  ctx.clearRect(0, 0, OUTPUT_SIZE, OUTPUT_SIZE);

  // 크롭 영역이 이미지 밖으로 나가는지 확인
  const needsPad = sx < 0 || sy < 0 || sx + size > img.width || sy + size > img.height;

  if (needsPad) {
    // 가장자리 색 샘플링해서 배경 채우기
    const edgeColor = sampleEdgeColor(img, sx, sy, size);

    // 1) 샘플링한 색으로 전체 배경
    ctx.fillStyle = edgeColor;
    ctx.fillRect(0, 0, OUTPUT_SIZE, OUTPUT_SIZE);

    // 2) 그 위에 블러 효과로 경계 부드럽게 (이미지 확대 후 흐리게 깔기)
    const clipSx2 = Math.max(sx, 0);
    const clipSy2 = Math.max(sy, 0);
    const clipEx2 = Math.min(sx + size, img.width);
    const clipEy2 = Math.min(sy + size, img.height);
    const clipW2 = clipEx2 - clipSx2, clipH2 = clipEy2 - clipSy2;
    if (clipW2 > 0 && clipH2 > 0) {
      ctx.filter = 'blur(18px)';
      // 이미지 가장자리를 늘려서 빈 공간 채우기
      ctx.drawImage(img, clipSx2, clipSy2, clipW2, clipH2, 0, 0, OUTPUT_SIZE, OUTPUT_SIZE);
      ctx.filter = 'none';
    }
  }

  // 실제 이미지 정확한 위치에 그리기
  const clipSx = Math.max(sx, 0);
  const clipSy = Math.max(sy, 0);
  const clipEx = Math.min(sx + size, img.width);
  const clipEy = Math.min(sy + size, img.height);
  const clipW  = clipEx - clipSx;
  const clipH  = clipEy - clipSy;
  if (clipW <= 0 || clipH <= 0) return;

  const dxRatio = (clipSx - sx) / size;
  const dyRatio = (clipSy - sy) / size;
  const dwRatio = clipW / size;
  const dhRatio = clipH / size;

  ctx.drawImage(
    img,
    clipSx, clipSy, clipW, clipH,
    dxRatio * OUTPUT_SIZE, dyRatio * OUTPUT_SIZE,
    dwRatio * OUTPUT_SIZE, dhRatio * OUTPUT_SIZE
  );
}

function downloadResult() {
  const original = (originalFileName || 'photo.jpg').replace(/\.[^.]+$/, '');
  const a = document.createElement('a');
  a.download = `(hp)${original}.jpg`;
  a.href = resultCanvas.toDataURL('image/jpeg', 0.95);
  a.click();
}

function resetAll() {
  lastImg = null; lastBox = null;
  origImg.src = '';
  resultCanvas.getContext('2d').clearRect(0, 0, OUTPUT_SIZE, OUTPUT_SIZE);
  previews.classList.remove('visible');
  resetLink.classList.remove('visible');
  downloadBtn.disabled = true;
  fileInput.value = '';
  hideError();
  setStatus('이미지를 업로드하세요');
}

function showError(title, msg) {
  errorTitle.textContent = '⚠ ' + title;
  errorMsg.textContent = msg;
  errorBox.classList.add('visible');
  setStatus('');
}
function hideError() { errorBox.classList.remove('visible'); }
function setStatus(msg) {
  statusEl.textContent = msg;
  statusEl.className = msg === '인식 완료 ✓' ? 'status ok' : 'status';
}
</script>
</body>
</html>
