<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #f5f5f3;
    color: #111;
    min-height: 100vh;

    flex-direction: column;

  .card {

  .dropzone {
    border: 2px dashed #ddd;

  .btn:hover:not(:disabled) { opacity: 0.85; }

  .previews { display: none; gap: 12px; }
  .previews.visible { display: grid; grid-template-columns: 1fr 1fr; }

  .preview-wrap { display: flex; flex-direction: column; gap: 6px; }
  .preview-label { font-size: 11px; color: #aaa; text-align: center; }
  .preview-img-box {
    background: #f0f0ee;

    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    aspect-ratio: 1;
  }
  .preview-img-box img, .preview-img-box canvas {
    width: 100%; height: 100%; object-fit: contain;
  }

  .error-box {
    display: none;
    background: #fff8f8;
    border: 1px solid #ffc0c0;
    border-radius: 10px;

  }
  .error-box.visible { display: block; }
  .error-box .error-title { font-weight: 700; font-size: 14px; margin-bottom: 6px; }
  .error-box .error-guide {
    margin-top: 10px;

  .status { font-size: 13px; color: #888; text-align: center; min-height: 20px; }
  .status.ok { color: #080; }

  .spinner {

  .spinner.visible { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .reset-link {

    text-decoration: underline;

  /* 상단 공지 배너 */
  .notice-banner {
    background: #fff3cd;

    padding: 12px 16px;
    font-size: 13px;

    margin-bottom: 16px;

  }
  .notice-banner strong { color: #c00; }

  /* 업스케일 안내 모달 */

  /* 진행바 */

<body>

<!-- 업스케일 안내 모달 -->
</div>

<div class="notice-banner">
  📢 <strong>원본 이미지 구글 드라이브 업로드 필수!</strong><br>
  MBN 전달 · 통천배너 · 행사장 사용 용도
</div>

<h1>2026 세지포 파이팅!</h1>
<p class="sub">얼굴 자동 인식 → 300×300 JPG 저장</p>
<p class="build-info" id="buildInfo"></p>

<div class="card">

  <div class="dropzone" id="dropzone">
    <div class="dropzone-icon">🖼</div>
    <div class="dropzone-label">이미지를 드래그하거나 클릭해서 업로드</div>
    <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp,image/heic,image/bmp,image/tiff" multiple>
  </div>

  <div class="previews" id="previews">
    <div class="preview-wrap">
      <div class="preview-label">원본</div>
      <div class="preview-img-box"><img id="origImg" alt="원본"></div>
    </div>
    <div class="preview-wrap">
      <div class="preview-label">결과 · 300×300</div>
      <div class="preview-img-box"><canvas id="resultCanvas" width="300" height="300"></canvas></div>
    </div>
  </div>

  <div class="error-box" id="errorBox">
    <div class="error-title" id="errorTitle">⚠ 오류</div>
    <div id="errorMsg"></div>
    <div class="error-guide">
      원본 파일을 <strong>김태희 연구원</strong>에게 카카오톡으로 보내주세요.
    </div>
  </div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-label" id="progressLabel">업스케일 중... 0%</div>
    <div class="progress-bar-bg"><div class="progress-bar" id="progressBar"></div></div>
  </div>

  <div class="spinner" id="spinner"></div>
  <div class="status" id="status">모델 로딩 중...</div>
  <div class="batch-status" id="batchStatus"></div>

  <button class="btn" id="downloadBtn" disabled onclick="downloadResult()">저장</button>
  <span class="reset-link" id="resetLink" onclick="resetAll()">다시 업로드</span>

</div>

<script>
// ── 빌드 타임스탬프 표시 ──────────────────────────
const BUILD_TIME = '2026-04-01T07:58:34Z';
(function() {
  const d = new Date(BUILD_TIME);
  const pad = n => String(n).padStart(2,'0');
  const label = `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())} `
              + `${pad(d.getHours())}:${pad(d.getMinutes())} 배포`;
  document.getElementById('buildInfo').textContent = label;
})();

// ── 배포 설정 ──────────────────────────────────────
const FACE_FILL_RATIO = 0.45; // 결과 이미지에서 얼굴이 차지할 비율 (0~1)
const CENTER_Y_RATIO = 0.35;
const OUTPUT_SIZE    = 300;
const MAX_FILE_MB    = 50;
const UPSCALE_THRESHOLD = 300; // 이 픽셀 이하면 AI 업스케일 적용
const PAD_COLOR      = '#ffffff';
// ──────────────────────────────────────────────────

// ── Canvas 업스케일 (Lanczos 보간, 라이브러리 불필요) ──
function upscaleWithCanvas(img, scale = 4) {
  return new Promise(resolve => {
    const w = img.width * scale;
    const h = img.height * scale;
    // 단계적으로 2배씩 키워서 품질 유지
    let cur = document.createElement('canvas');
    cur.width = img.width; cur.height = img.height;
    cur.getContext('2d').drawImage(img, 0, 0);

    function step(canvas, targetW, targetH) {
      const next = document.createElement('canvas');
      const sw = Math.min(canvas.width * 2, targetW);
      const sh = Math.min(canvas.height * 2, targetH);
      next.width = sw; next.height = sh;
      const ctx = next.getContext('2d');
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(canvas, 0, 0, sw, sh);
      return next;
    }

    let c = cur;
    while (c.width < w || c.height < h) {
      c = step(c, w, h);
    }

    const result = new Image();
    result.onload = () => resolve(result);
    result.src = c.toDataURL('image/png');
  });
}

const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.13/model';

let modelsReady = false;
let lastImg = null;
let lastBox = null;
let originalFileName = '';
let pendingFile = null;
let currentObjectURL = null;

const progressWrap  = document.getElementById('progressWrap');
const progressBar   = document.getElementById('progressBar');
const progressLabel = document.getElementById('progressLabel');

const dropzone     = document.getElementById('dropzone');
const fileInput    = document.getElementById('fileInput');
const previews     = document.getElementById('previews');
const origImg      = document.getElementById('origImg');
const resultCanvas = document.getElementById('resultCanvas');
const spinner      = document.getElementById('spinner');
const statusEl     = document.getElementById('status');
const resetLink    = document.getElementById('resetLink');
const errorBox     = document.getElementById('errorBox');
const errorTitle   = document.getElementById('errorTitle');
const errorMsg     = document.getElementById('errorMsg');

function waitForFaceAPI(cb) {
  if (typeof faceapi !== 'undefined') cb();
  else setTimeout(() => waitForFaceAPI(cb), 100);
}
waitForFaceAPI(async () => {
  try {
    await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
    await faceapi.nets.faceLandmark68TinyNet.loadFromUri(MODEL_URL);
    modelsReady = true;
    setStatus('이미지를 업로드하세요');
  } catch {
    showError('모델 로딩 실패', '네트워크 연결을 확인하고 새로고침 해주세요.');
  }
});

dropzone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => {
  const files = Array.from(e.target.files);
  if (files.length) handleFiles(files);
});
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('over'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('over'));
dropzone.addEventListener('drop', e => {
  e.preventDefault(); dropzone.classList.remove('over');
  const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
  if (files.length) handleFiles(files);
});

// 다중 파일 순차 처리
async function handleFiles(files) {
  const total = files.length;
  const batchStatus = document.getElementById('batchStatus');
  for (let i = 0; i < total; i++) {
    batchStatus.textContent = total > 1 ? `${i + 1} / ${total} 처리 중` : '';
    await handleFile(files[i]);
  }
  batchStatus.textContent = total > 1 ? `✓ ${total}장 완료` : '';
  setTimeout(() => { batchStatus.textContent = ''; }, 3000);
}

async function handleFile(file) {
  hideError();
  resetLink.classList.remove('visible');
  originalFileName = file.name;

  if (!modelsReady) { showError('모델 준비 중', '잠시 후 다시 시도해 주세요.'); return; }
  if (file.size > MAX_FILE_MB * 1024 * 1024) {
    showError('파일 크기 초과', `파일 크기가 ${MAX_FILE_MB}MB를 초과합니다. (현재 ${(file.size/1024/1024).toFixed(1)}MB)`);
    resetLink.classList.add('visible');
    return;
  }
  const ALLOWED = ['image/jpeg','image/png','image/webp','image/heic','image/bmp','image/tiff'];
  if (!ALLOWED.includes(file.type) && !file.type.startsWith('image/')) {
    showError('지원하지 않는 형식', '이미지 파일만 업로드할 수 있습니다.');
    resetLink.classList.add('visible');
    return;
  }

  if (currentObjectURL) URL.revokeObjectURL(currentObjectURL);
  const url = URL.createObjectURL(file);
  currentObjectURL = url;
  fileInput.value = '';
  origImg.src = url;
  previews.classList.add('visible');
  setStatus('');  spinner.classList.add('visible');

  const img = new Image();
  img.onload = async () => {
    spinner.classList.remove('visible');
    const needsUpscale = Math.max(img.width, img.height) <= UPSCALE_THRESHOLD;
    await processImage(img, needsUpscale);
  };
  img.onerror = () => {
    spinner.classList.remove('visible');
    showError('파일 오류', '이미지를 불러올 수 없습니다. 파일이 손상되었을 수 있습니다.');
    resetLink.classList.add('visible');
  };
  img.src = url;
}

// 모달: 업스케일 후 진행
// 실제 이미지 처리 (업스케일 여부 선택)
async function processImage(img, doUpscale = false) {
  spinner.classList.add('visible');
  let procImg = img;

  if (doUpscale) {
    spinner.classList.remove('visible');
    progressWrap.classList.add('visible');
    setProgress(0, '업스케일 준비 중...');

    try {
      let fakeP = 0;
      const timer = setInterval(() => {
        fakeP = Math.min(fakeP + Math.random() * 15, 90);
        setProgress(fakeP, `업스케일 중... ${Math.round(fakeP)}%`);
      }, 200);

      procImg = await upscaleWithCanvas(img, 4);
      clearInterval(timer);
      setProgress(100, '업스케일 완료!');
      await new Promise(r => setTimeout(r, 400));
    } catch(e) {
      console.warn('업스케일 실패, 원본 사용:', e);
      setProgress(100, '업스케일 실패 — 원본으로 진행합니다');
      await new Promise(r => setTimeout(r, 600));
    }

    progressWrap.classList.remove('visible');
    spinner.classList.add('visible');
  }

  try {
    setStatus('얼굴 인식 중...');
    const opts = new faceapi.TinyFaceDetectorOptions({ inputSize: 608, scoreThreshold: 0.2 });
    const dets = await faceapi.detectAllFaces(procImg, opts).withFaceLandmarks(true);

    if (!dets || dets.length === 0) {
      spinner.classList.remove('visible');
      showError('얼굴 인식 실패', '사진에서 얼굴을 찾지 못했습니다. 정면을 바라보는 선명한 사진을 사용해 주세요.');
      resetLink.classList.add('visible');
      return;
    }

    const det = dets.reduce((a, b) =>
      a.detection.box.width * a.detection.box.height >=
      b.detection.box.width * b.detection.box.height ? a : b
    );

    const lm = det.landmarks.positions;
    const topY    = Math.min(...lm.slice(17, 27).map(p => p.y));
    const bottomY = Math.max(...lm.slice(0, 17).map(p => p.y));
    const leftX   = Math.min(...lm.map(p => p.x));
    const rightX  = Math.max(...lm.map(p => p.x));
    const faceH   = bottomY - topY;
    const faceW   = rightX - leftX;
    const faceSize = Math.max(faceW, faceH);
    const faceCx   = (leftX + rightX) / 2;
    const faceCy   = topY + faceH * CENTER_Y_RATIO;

    lastImg = procImg; lastBox = { cx: faceCx, cy: faceCy, faceSize };
    cropAndDraw(procImg, lastBox);
    spinner.classList.remove('visible');
    setStatus('인식 완료 ✓');
    document.getElementById('downloadBtn').disabled = false;
    resetLink.classList.add('visible');
  } catch {
    spinner.classList.remove('visible');
    showError('처리 오류', '이미지 처리 중 문제가 발생했습니다.');
    resetLink.classList.add('visible');
  }
}

function setProgress(pct, label) {
  progressBar.style.width = pct + '%';
  progressLabel.textContent = label;
}

function cropAndDraw(img, { cx, cy, faceSize }) {
  const size = faceSize / FACE_FILL_RATIO;
  const half = size / 2;
  const sx = cx - half;
  const sy = cy - half;

  const ctx = resultCanvas.getContext('2d');
  ctx.clearRect(0, 0, OUTPUT_SIZE, OUTPUT_SIZE);

  // 크롭 영역이 이미지 밖으로 나가는지 확인
  const needsPad = sx < 0 || sy < 0 || sx + size > img.width || sy + size > img.height;

  if (needsPad) {
    const tmpC = document.createElement('canvas');
    tmpC.width = img.width; tmpC.height = img.height;
    const tmpCtx = tmpC.getContext('2d');
    tmpCtx.drawImage(img, 0, 0);

    // 캔버스 좌표 헬퍼
    const toD = (imgCoord) => (imgCoord - sx) / size * OUTPUT_SIZE;
    const imgL = (Math.max(sx, 0) - sx) / size * OUTPUT_SIZE;
    const imgT = (Math.max(sy, 0) - sy) / size * OUTPUT_SIZE;
    const imgR = (Math.min(sx + size, img.width)  - sx) / size * OUTPUT_SIZE;
    const imgB = (Math.min(sy + size, img.height) - sy) / size * OUTPUT_SIZE;
    const imgW = imgR - imgL;
    const imgH = imgB - imgT;

    // ── 위쪽 ──
    if (sy < 0) {
      ctx.drawImage(tmpC, 0, 0, img.width, 1,
        imgL, 0, imgW, imgT);
    }
    // ── 아래쪽 ──
    if (sy + size > img.height) {
      ctx.drawImage(tmpC, 0, img.height - 1, img.width, 1,
        imgL, imgB, imgW, OUTPUT_SIZE - imgB);
    }
    // ── 왼쪽 ──
    if (sx < 0) {
      ctx.drawImage(tmpC, 0, 0, 1, img.height,
        0, imgT, imgL, imgH);
    }
    // ── 오른쪽 ──
    if (sx + size > img.width) {
      ctx.drawImage(tmpC, img.width - 1, 0, 1, img.height,
        imgR, imgT, OUTPUT_SIZE - imgR, imgH);
    }
    // ── 모서리 4개: 코너 픽셀 1개를 늘림 ──
    // 좌상단
    if (sx < 0 && sy < 0) {
      ctx.drawImage(tmpC, 0, 0, 1, 1, 0, 0, imgL, imgT);
    }
    // 우상단
    if (sx + size > img.width && sy < 0) {
      ctx.drawImage(tmpC, img.width - 1, 0, 1, 1, imgR, 0, OUTPUT_SIZE - imgR, imgT);
    }
    // 좌하단
    if (sx < 0 && sy + size > img.height) {
      ctx.drawImage(tmpC, 0, img.height - 1, 1, 1, 0, imgB, imgL, OUTPUT_SIZE - imgB);
    }
    // 우하단
    if (sx + size > img.width && sy + size > img.height) {
      ctx.drawImage(tmpC, img.width - 1, img.height - 1, 1, 1, imgR, imgB, OUTPUT_SIZE - imgR, OUTPUT_SIZE - imgB);
    }
  }

  // 실제 이미지 정확한 위치에 그리기
  const clipSx = Math.max(sx, 0);
  const clipSy = Math.max(sy, 0);
  const clipEx = Math.min(sx + size, img.width);
  const clipEy = Math.min(sy + size, img.height);
  const clipW  = clipEx - clipSx;
  const clipH  = clipEy - clipSy;
  if (clipW <= 0 || clipH <= 0) return;

  const dxRatio = (clipSx - sx) / size;
  const dyRatio = (clipSy - sy) / size;
  const dwRatio = clipW / size;
  const dhRatio = clipH / size;

  ctx.drawImage(
    img,
    clipSx, clipSy, clipW, clipH,
    dxRatio * OUTPUT_SIZE, dyRatio * OUTPUT_SIZE,
    dwRatio * OUTPUT_SIZE, dhRatio * OUTPUT_SIZE
  );
}

function downloadResult() {
  const original = (originalFileName || 'photo.jpg').replace(/\.[^.]+$/, '');
  const a = document.createElement('a');
  a.download = `(hp)${original}.jpg`;
  a.href = resultCanvas.toDataURL('image/jpeg', 0.95);
  a.click();
}

function resetAll() {
  lastImg = null; lastBox = null;
  if (currentObjectURL) { URL.revokeObjectURL(currentObjectURL); currentObjectURL = null; }
  origImg.src = '';
  resultCanvas.getContext('2d').clearRect(0, 0, OUTPUT_SIZE, OUTPUT_SIZE);
  previews.classList.remove('visible');
  resetLink.classList.remove('visible');
  document.getElementById('downloadBtn').disabled = true;
  fileInput.value = '';
  hideError();
  setStatus('이미지를 업로드하세요');
  document.getElementById('batchStatus').textContent = '';
}

function showError(title, msg) {
  errorTitle.textContent = '⚠ ' + title;
  errorMsg.textContent = msg;
  errorBox.classList.add('visible');
  setStatus('');
}
function hideError() { errorBox.classList.remove('visible'); }
function setStatus(msg) {
  statusEl.textContent = msg;
  statusEl.className = msg === '인식 완료 ✓' ? 'status ok' : 'status';
}
</script>
</body>
