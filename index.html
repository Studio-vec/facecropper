<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FaceCropper</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<!-- BUILD:2026-04-01T06:51:36Z -->
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #f5f5f3;
    color: #111;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  h1 { font-size: 18px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.3px; }
  .sub { font-size: 13px; color: #888; margin-bottom: 4px; }
  .build-info { font-size: 11px; color: #bbb; margin-bottom: 28px; }

  .card {
    background: #fff;
    border-radius: 16px;
    padding: 32px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.07);
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .dropzone {
    border: 2px dashed #ddd;
    border-radius: 12px;
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  .dropzone:hover, .dropzone.over { border-color: #111; background: #fafafa; }
  .dropzone-icon { font-size: 36px; }
  .dropzone-label { font-size: 14px; color: #555; }
  #fileInput { display: none; }

  .btn {
    background: #111;
    color: #fff;
    border: none;
    padding: 14px;
    border-radius: 10px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    transition: opacity 0.15s;
  }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn:hover:not(:disabled) { opacity: 0.85; }

  .previews { display: none; gap: 12px; }
  .previews.visible { display: grid; grid-template-columns: 1fr 1fr; }

  .preview-wrap { display: flex; flex-direction: column; gap: 6px; }
  .preview-label { font-size: 11px; color: #aaa; text-align: center; }
  .preview-img-box {
    background: #f0f0ee;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    aspect-ratio: 1;
  }
  .preview-img-box img, .preview-img-box canvas {
    width: 100%; height: 100%; object-fit: contain;
  }

  .error-box {
    display: none;
    background: #fff8f8;
    border: 1px solid #ffc0c0;
    border-radius: 10px;
    padding: 16px 18px;
    font-size: 13px;
    line-height: 1.8;
    color: #c00;
  }
  .error-box.visible { display: block; }
  .error-box .error-title { font-weight: 700; font-size: 14px; margin-bottom: 6px; }
  .error-box .error-guide {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid #ffd0d0;
    color: #555;
    font-size: 13px;
  }

  .status { font-size: 13px; color: #888; text-align: center; min-height: 20px; }
  .status.ok { color: #080; }

  .spinner {
    display: none;
    width: 20px; height: 20px;
    border: 2px solid #ddd;
    border-top-color: #111;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto;
  }
  .spinner.visible { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .reset-link {
    display: none;
    text-align: center;
    font-size: 13px;
    color: #aaa;
    cursor: pointer;
    text-decoration: underline;
  }
  .reset-link.visible { display: block; }
</style>
</head>
<body>

<h1>2026 세지포 파이팅!</h1>
<p class="sub">얼굴 자동 인식 → 300×300 JPG 저장</p>
<p class="build-info" id="buildInfo"></p>

<div class="card">

  <div class="dropzone" id="dropzone">
    <div class="dropzone-icon">🖼</div>
    <div class="dropzone-label">이미지를 드래그하거나 클릭해서 업로드</div>
    <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp,image/heic,image/bmp,image/tiff">
  </div>

  <div class="previews" id="previews">
    <div class="preview-wrap">
      <div class="preview-label">원본</div>
      <div class="preview-img-box"><img id="origImg" alt="원본"></div>
    </div>
    <div class="preview-wrap">
      <div class="preview-label">결과 · 300×300</div>
      <div class="preview-img-box"><canvas id="resultCanvas" width="300" height="300"></canvas></div>
    </div>
  </div>

  <div class="error-box" id="errorBox">
    <div class="error-title" id="errorTitle">⚠ 오류</div>
    <div id="errorMsg"></div>
    <div class="error-guide">
      원본 파일을 <strong>김태희 연구원</strong>에게 카카오톡으로 보내주세요.
    </div>
  </div>

  <div class="spinner" id="spinner"></div>
  <div class="status" id="status">모델 로딩 중...</div>

  <button class="btn" id="downloadBtn" disabled onclick="downloadResult()">저장</button>
  <span class="reset-link" id="resetLink" onclick="resetAll()">다시 업로드</span>

</div>

<script>
// ── 빌드 타임스탬프 표시 ──────────────────────────
const BUILD_TIME = '2026-04-01T06:51:36Z';
(function() {
  const d = new Date(BUILD_TIME);
  const pad = n => String(n).padStart(2,'0');
  const label = `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())} `
              + `${pad(d.getHours())}:${pad(d.getMinutes())} 배포`;
  document.getElementById('buildInfo').textContent = label;
})();

// ── 배포 설정 ──────────────────────────────────────
const FACE_FILL_RATIO = 0.50; // 결과 이미지에서 얼굴이 차지할 비율 (0~1)
const CENTER_Y_RATIO = 0.35;
const OUTPUT_SIZE    = 300;
const MAX_FILE_MB    = 10;
const PAD_COLOR      = '#ffffff'; // 여백 부족 시 채울 배경색
// ──────────────────────────────────────────────────

const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.13/model';

let modelsReady = false;
let lastImg = null;
let lastBox = null;
let originalFileName = '';

const dropzone     = document.getElementById('dropzone');
const fileInput    = document.getElementById('fileInput');
const previews     = document.getElementById('previews');
const origImg      = document.getElementById('origImg');
const resultCanvas = document.getElementById('resultCanvas');
const spinner      = document.getElementById('spinner');
const statusEl     = document.getElementById('status');
const downloadBtn  = document.getElementById('downloadBtn');
const resetLink    = document.getElementById('resetLink');
const errorBox     = document.getElementById('errorBox');
const errorTitle   = document.getElementById('errorTitle');
const errorMsg     = document.getElementById('errorMsg');

function waitForFaceAPI(cb) {
  if (typeof faceapi !== 'undefined') cb();
  else setTimeout(() => waitForFaceAPI(cb), 100);
}
waitForFaceAPI(async () => {
  try {
    await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
    await faceapi.nets.faceLandmark68TinyNet.loadFromUri(MODEL_URL);
    modelsReady = true;
    setStatus('이미지를 업로드하세요');
  } catch {
    showError('모델 로딩 실패', '네트워크 연결을 확인하고 새로고침 해주세요.');
  }
});

dropzone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('over'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('over'));
dropzone.addEventListener('drop', e => {
  e.preventDefault(); dropzone.classList.remove('over');
  const f = e.dataTransfer.files[0];
  if (f) handleFile(f);
});

async function handleFile(file) {
  hideError();
  resetLink.classList.remove('visible');
  downloadBtn.disabled = true;
  originalFileName = file.name;

  if (!modelsReady) { showError('모델 준비 중', '잠시 후 다시 시도해 주세요.'); return; }
  if (file.size > MAX_FILE_MB * 1024 * 1024) {
    showError('파일 크기 초과', `파일 크기가 ${MAX_FILE_MB}MB를 초과합니다. (현재 ${(file.size/1024/1024).toFixed(1)}MB)`);
    resetLink.classList.add('visible');
    return;
  }
  const ALLOWED = ['image/jpeg','image/png','image/webp','image/heic','image/bmp','image/tiff'];
  if (!ALLOWED.includes(file.type) && !file.type.startsWith('image/')) {
    showError('지원하지 않는 형식', '이미지 파일만 업로드할 수 있습니다.');
    resetLink.classList.add('visible');
    return;
  }

  const url = URL.createObjectURL(file);
  origImg.src = url;
  previews.classList.add('visible');
  setStatus('');
  spinner.classList.add('visible');

  const img = new Image();
  img.onload = async () => {
    try {
      const opts = new faceapi.TinyFaceDetectorOptions({ inputSize: 512, scoreThreshold: 0.4 });
      const dets = await faceapi.detectAllFaces(img, opts).withFaceLandmarks(true);

      if (!dets || dets.length === 0) {
        spinner.classList.remove('visible');
        showError('얼굴 인식 실패', '사진에서 얼굴을 찾지 못했습니다. 정면을 바라보는 선명한 사진을 사용해 주세요.');
        resetLink.classList.add('visible');
        return;
      }

      // 가장 큰 얼굴 선택
      const det = dets.reduce((a, b) =>
        a.detection.box.width * a.detection.box.height >=
        b.detection.box.width * b.detection.box.height ? a : b
      );

      // 랜드마크로 실제 얼굴 크기 측정 (눈 위 ~ 턱 끝 세로 거리)
      const lm = det.landmarks.positions;
      const topY    = Math.min(...lm.slice(17, 27).map(p => p.y)); // 눈썹 위
      const bottomY = Math.max(...lm.slice(0, 17).map(p => p.y));  // 턱 라인
      const leftX   = Math.min(...lm.map(p => p.x));
      const rightX  = Math.max(...lm.map(p => p.x));
      const faceH   = bottomY - topY;
      const faceW   = rightX - leftX;
      const faceSize = Math.max(faceW, faceH);
      const faceCx   = (leftX + rightX) / 2;
      const faceCy   = topY + faceH * CENTER_Y_RATIO;

      lastImg = img;
      lastBox = { cx: faceCx, cy: faceCy, faceSize };
      cropAndDraw(img, lastBox);
      spinner.classList.remove('visible');
      setStatus('인식 완료 ✓');
      downloadBtn.disabled = false;
      resetLink.classList.add('visible');
    } catch {
      spinner.classList.remove('visible');
      showError('처리 오류', '이미지 처리 중 문제가 발생했습니다.');
      resetLink.classList.add('visible');
    }
  };
  img.onerror = () => {
    spinner.classList.remove('visible');
    showError('파일 오류', '이미지를 불러올 수 없습니다. 파일이 손상되었을 수 있습니다.');
    resetLink.classList.add('visible');
  };
  img.src = url;
}

function cropAndDraw(img, { cx, cy, faceSize }) {
  // 랜드마크로 측정한 실제 얼굴 크기 기준으로 크롭 영역 역산
  const size = faceSize / FACE_FILL_RATIO;
  const half = size / 2;

  const sx = cx - half;
  const sy = cy - half;

  const ctx = resultCanvas.getContext('2d');
  ctx.clearRect(0, 0, OUTPUT_SIZE, OUTPUT_SIZE);
  ctx.fillStyle = PAD_COLOR;
  ctx.fillRect(0, 0, OUTPUT_SIZE, OUTPUT_SIZE);

  const clipSx = Math.max(sx, 0);
  const clipSy = Math.max(sy, 0);
  const clipEx = Math.min(sx + size, img.width);
  const clipEy = Math.min(sy + size, img.height);
  const clipW  = clipEx - clipSx;
  const clipH  = clipEy - clipSy;
  if (clipW <= 0 || clipH <= 0) return;

  const dxRatio = (clipSx - sx) / size;
  const dyRatio = (clipSy - sy) / size;
  const dwRatio = clipW / size;
  const dhRatio = clipH / size;

  ctx.drawImage(
    img,
    clipSx, clipSy, clipW, clipH,
    dxRatio * OUTPUT_SIZE, dyRatio * OUTPUT_SIZE,
    dwRatio * OUTPUT_SIZE, dhRatio * OUTPUT_SIZE
  );
}

function downloadResult() {
  const original = (originalFileName || 'photo.jpg').replace(/\.[^.]+$/, '');
  const a = document.createElement('a');
  a.download = `(hp)${original}.jpg`;
  a.href = resultCanvas.toDataURL('image/jpeg', 0.95);
  a.click();
}

function resetAll() {
  lastImg = null; lastBox = null;
  origImg.src = '';
  resultCanvas.getContext('2d').clearRect(0, 0, OUTPUT_SIZE, OUTPUT_SIZE);
  previews.classList.remove('visible');
  resetLink.classList.remove('visible');
  downloadBtn.disabled = true;
  fileInput.value = '';
  hideError();
  setStatus('이미지를 업로드하세요');
}

function showError(title, msg) {
  errorTitle.textContent = '⚠ ' + title;
  errorMsg.textContent = msg;
  errorBox.classList.add('visible');
  setStatus('');
}
function hideError() { errorBox.classList.remove('visible'); }
function setStatus(msg) {
  statusEl.textContent = msg;
  statusEl.className = msg === '인식 완료 ✓' ? 'status ok' : 'status';
}
</script>
</body>
</html>
